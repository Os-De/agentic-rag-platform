# Core: api + qdrant + postgres
# Profiles: monitoring (prometheus, grafana) | mlops (mlflow) | ui (streamlit) | tracing
#   e.g. docker compose --profile monitoring --profile ui up -d

services:
  api:
    build: ./services/api
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # In-network overrides (win over .env)
      DATABASE_URL: postgresql+psycopg://rag:rag@postgres:5432/rag
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006/v1/traces
      OTLP_ENDPOINT: http://jaeger:4318
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux compatibility
    volumes:
      - fastembed_cache:/root/.cache          # keep downloaded embedding models
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: rag-qdrant
    ports:
      - "6333:6333"       # REST + web dashboard at /dashboard
      - "6334:6334"       # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── profile: monitoring ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: rag-prometheus
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prom_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.3
    container_name: rag-grafana
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── profile: tracing (ADR-011) ─────────────────────────────────────────────
  # Set TRACING_BACKEND=phoenix or traceloop in .env, then:
  #   docker compose --profile tracing up -d
  phoenix:
    image: arizephoenix/phoenix:latest   # pin a version tag for production
    container_name: rag-phoenix
    profiles: ["tracing"]
    ports:
      - "6006:6006"    # UI + OTLP HTTP collector (/v1/traces)
    volumes:
      - phoenix_data:/mnt/data
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: rag-jaeger
    profiles: ["tracing"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4318:4318"    # OTLP HTTP (traceloop backend target)
    restart: unless-stopped

  # ── profile: mlops ─────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: rag-mlflow
    profiles: ["mlops"]
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0 --port 5000
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  # ── profile: ui ────────────────────────────────────────────────────────────
  ui:
    build: ./ui
    container_name: rag-ui
    profiles: ["ui"]
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
  prom_data:
  grafana_data:
  mlflow_data:
  phoenix_data:
  fastembed_cache:

# QLoRA training config — one file defines a reproducible run (logged to MLflow).

base_model: "Qwen/Qwen2.5-1.5B-Instruct"   # start small locally; 7-8B on cloud GPU
dataset_path: "dataset.jsonl"
output_dir: "outputs/qwen2.5-1.5b-domain-v1"

# Quantization (QLoRA)
load_in_4bit: true

# LoRA — rank controls capacity, alpha scales the update (alpha ≈ 2×rank is a common start)
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8       # effective batch = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  max_seq_length: 1024
  logging_steps: 10
  seed: 42

mlflow:
  tracking_uri: "http://localhost:5000"
  experiment: "qlora-domain-adaptation"
